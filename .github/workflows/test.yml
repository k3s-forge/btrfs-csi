name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install btrfs-progs and protoc
      run: sudo apt-get update && sudo apt-get install -y btrfs-progs protobuf-compiler

    - name: Create btrfs test filesystem
      run: |
        truncate -s 10G /tmp/btrfs-test.img
        sudo mkfs.btrfs -f /tmp/btrfs-test.img
        sudo mkdir -p /mnt/btrfs-data
        sudo mkdir -p /mnt/btrfs-snapshots
        sudo mount -o loop /tmp/btrfs-test.img /mnt/btrfs-data
        sudo mount -o loop /tmp/btrfs-test.img /mnt/btrfs-snapshots
        sudo btrfs filesystem show /mnt/btrfs-data
        df -h /mnt/btrfs-data

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: test-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run tests
      run: cargo test --workspace 2>&1
      env:
        BTRFS_TEST_DIR: /mnt/btrfs-data
        BTRFS_SNAPSHOT_DIR: /mnt/btrfs-snapshots

    - name: Test large data write
      run: |
        echo "=== Writing 1GB test data ==="
        sudo dd if=/dev/urandom of=/mnt/btrfs-data/test-1gb.bin bs=1M count=1024
        sudo sync
        echo "=== Creating snapshot ==="
        sudo btrfs subvolume snapshot -r /mnt/btrfs-data /mnt/btrfs-snapshots/snap-1
        ls -la /mnt/btrfs-snapshots/
        echo "=== Writing more data ==="
        sudo dd if=/dev/urandom of=/mnt/btrfs-data/test-2gb.bin bs=1M count=1024
        sudo sync
        echo "=== Creating incremental snapshot ==="
        sudo btrfs subvolume snapshot -r /mnt/btrfs-data /mnt/btrfs-snapshots/snap-2
        ls -la /mnt/btrfs-snapshots/
        echo "=== Testing btrfs send (incremental) ==="
        sudo btrfs send -p /mnt/btrfs-snapshots/snap-1 /mnt/btrfs-snapshots/snap-2 | wc -c
        echo "bytes sent incrementally"
        echo "=== Test complete ==="
        sudo btrfs filesystem usage /mnt/btrfs-data

    - name: Test replication protocol
      run: |
        echo "=== Testing HMAC authentication ==="
        KEY=$(openssl rand -hex 32)
        echo "Generated key: ${KEY:0:8}..."
        echo "=== Testing message serialization ==="
        cargo run --bin btrfs-csi -- --help
        echo "=== Protocol test complete ==="

    - name: Unmount btrfs
      if: always()
      run: |
        sudo umount /mnt/btrfs-data || true
        sudo umount /mnt/btrfs-snapshots || true
        rm -f /tmp/btrfs-test.img

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/debug/deps/