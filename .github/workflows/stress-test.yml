name: Stress Test

on:
  push:
    paths:
      - 'stress-trigger'
  workflow_dispatch:

jobs:
  stress-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y btrfs-progs fio jq

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build CSI driver
      run: cargo build --release

    - name: Create test environment
      run: |
        sudo truncate -s 10G /tmp/btrfs-stress.img
        sudo mkfs.btrfs -f -d single -m dup /tmp/btrfs-stress.img
        sudo mkdir -p /mnt/stress/data /mnt/stress/snapshots
        sudo mount -o loop /tmp/btrfs-stress.img /mnt/stress/data
        df -h /mnt/stress/data
        sudo btrfs filesystem show /mnt/stress/data

    - name: "Test 1: Sequential Write Throughput"
      continue-on-error: true
      run: |
        echo "=== TEST 1: SEQUENTIAL WRITE THROUGHPUT ==="
        for bs in 4k 16k 64k 256k 1m 4m 16m; do
          echo "--- $bs ---"
          sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' 2>/dev/null || true
          sudo fio --name="w_${bs}" --directory=/mnt/stress/data --rw=write --bs="$bs" --size=256M --numjobs=1 --runtime=15 --time_based --group_reporting --output-format=json --output="/tmp/fio_w_${bs}.json" 2>/dev/null
          BW=$(jq '.jobs[0].write.bw / 1024 | floor' "/tmp/fio_w_${bs}.json" 2>/dev/null || echo "0")
          IOPS=$(jq '.jobs[0].write.iops | floor' "/tmp/fio_w_${bs}.json" 2>/dev/null || echo "0")
          LAT=$(jq '.jobs[0].write.lat_ns.mean / 1000 | floor' "/tmp/fio_w_${bs}.json" 2>/dev/null || echo "0")
          echo "  $bs: ${BW} MB/s | ${IOPS} IOPS | ${LAT} us"
          sudo rm -f /mnt/stress/data/w_*
          rm -f "/tmp/fio_w_${bs}.json"
        done

    - name: "Test 2: Random Write IOPS"
      continue-on-error: true
      run: |
        echo "=== TEST 2: RANDOM WRITE IOPS ==="
        for bs in 4k 16k 64k; do
          echo "--- $bs ---"
          sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' 2>/dev/null || true
          sudo fio --name="rw_${bs}" --directory=/mnt/stress/data --rw=randwrite --bs="$bs" --size=128M --numjobs=4 --runtime=15 --time_based --group_reporting --output-format=json --output="/tmp/fio_rw_${bs}.json" 2>/dev/null
          BW=$(jq '.jobs[0].write.bw / 1024 | floor' "/tmp/fio_rw_${bs}.json" 2>/dev/null || echo "0")
          IOPS=$(jq '.jobs[0].write.iops | floor' "/tmp/fio_rw_${bs}.json" 2>/dev/null || echo "0")
          LAT=$(jq '.jobs[0].write.lat_ns.mean / 1000 | floor' "/tmp/fio_rw_${bs}.json" 2>/dev/null || echo "0")
          echo "  $bs: ${BW} MB/s | ${IOPS} IOPS | ${LAT} us"
          sudo rm -f /mnt/stress/data/rw_*
          rm -f "/tmp/fio_rw_${bs}.json"
        done

    - name: "Test 3: Concurrent Subvolumes"
      continue-on-error: true
      run: |
        echo "=== TEST 3: CONCURRENT SUBVOLUMES ==="
        sudo btrfs subvolume list /mnt/stress/data 2>/dev/null | awk '{print $NF}' | while read sv; do
          sudo btrfs subvolume delete "/mnt/stress/data/$sv" 2>/dev/null || true
        done
        START=$(date +%s%N)
        for i in $(seq 1 500); do
          sudo btrfs subvolume create /mnt/stress/data/vol-$i > /dev/null 2>&1
        done
        END=$(date +%s%N)
        DURATION=$(( (END - START) / 1000000 ))
        echo "500 subvolumes created in ${DURATION}ms"
        echo "Rate: $(( 500000 / (DURATION + 1) )) subvolumes/sec"

    - name: "Test 4: Snapshot Performance"
      continue-on-error: true
      run: |
        echo "=== TEST 4: SNAPSHOT PERFORMANCE ==="
        echo "Creating 100MB test data..."
        sudo btrfs subvolume create /mnt/stress/data/snap-src > /dev/null 2>&1
        sudo dd if=/dev/urandom of=/mnt/stress/data/snap-src/testfile bs=1M count=100 2>/dev/null
        sudo sync

        echo "Creating 100 snapshots..."
        START=$(date +%s%N)
        for i in $(seq 1 100); do
          sudo btrfs subvolume snapshot -r /mnt/stress/data/snap-src /mnt/stress/snap-$i > /dev/null 2>&1
        done
        END=$(date +%s%N)
        DURATION=$(( (END - START) / 1000000 ))
        echo "100 snapshots created in ${DURATION}ms"
        echo "Rate: $(( 100000 / (DURATION + 1) )) snapshots/sec"
        echo "Avg: $(( DURATION / 100 ))ms per snapshot"

    - name: "Test 5: Replication Speed"
      continue-on-error: true
      run: |
        echo "=== TEST 5: REPLICATION SPEED (btrfs send) ==="
        for size in 100 500 1024; do
          echo "--- ${size}MB ---"
          sudo btrfs subvolume create /mnt/stress/data/rep-test > /dev/null 2>&1
          sudo dd if=/dev/urandom of=/mnt/stress/data/rep-test/data.bin bs=1M count=$size 2>/dev/null
          sudo sync
          sudo btrfs subvolume snapshot -r /mnt/stress/data/rep-test /mnt/stress/rep-snap > /dev/null 2>&1

          START=$(date +%s%N)
          BYTES=$(sudo btrfs send /mnt/stress/rep-snap 2>/dev/null | wc -c)
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          MB=$((BYTES / 1048576))
          if [ "$DURATION" -gt 0 ]; then
            RATE=$(( MB * 1000 / DURATION ))
          else
            RATE=9999
          fi
          echo "  Sent ${MB}MB in ${DURATION}ms = ${RATE}MB/s"

          sudo btrfs subvolume delete /mnt/stress/data/rep-test 2>/dev/null || true
          sudo btrfs subvolume delete /mnt/stress/rep-snap 2>/dev/null || true
        done

    - name: "Test 6: Incremental Replication"
      continue-on-error: true
      run: |
        echo "=== TEST 6: INCREMENTAL REPLICATION ==="
        sudo btrfs subvolume create /mnt/stress/data/inc-test > /dev/null 2>&1
        sudo dd if=/dev/urandom of=/mnt/stress/data/inc-test/base.bin bs=1M count=512 2>/dev/null
        sudo sync
        sudo btrfs subvolume snapshot -r /mnt/stress/data/inc-test /mnt/stress/inc-snap0 > /dev/null 2>&1

        echo "Full send baseline (512MB)..."
        START=$(date +%s%N)
        sudo btrfs send /mnt/stress/inc-snap0 2>/dev/null | wc -c
        END=$(date +%s%N)
        BASE_MS=$(( (END - START) / 1000000 ))
        echo "  Full: ${BASE_MS}ms"

        for round in 1 2 3 4 5; do
          DELTA=$((round * 50))
          sudo dd if=/dev/urandom of=/mnt/stress/data/inc-test/delta.bin bs=1M count=$DELTA 2>/dev/null
          sudo sync
          sudo btrfs subvolume snapshot -r /mnt/stress/data/inc-test /mnt/stress/inc-snap$round > /dev/null 2>&1

          START=$(date +%s%N)
          BYTES=$(sudo btrfs send -p /mnt/stress/inc-snap$((round-1)) /mnt/stress/inc-snap$round 2>/dev/null | wc -c)
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          KB=$((BYTES / 1024))
          echo "  Round $round: +${DELTA}MB delta, sent ${KB}KB in ${DURATION}ms"
        done

        for i in $(seq 0 5); do
          sudo btrfs subvolume delete /mnt/stress/inc-snap$i 2>/dev/null || true
        done
        sudo btrfs subvolume delete /mnt/stress/data/inc-test 2>/dev/null || true

    - name: "Test 7: Memory Usage"
      continue-on-error: true
      run: |
        echo "=== TEST 7: MEMORY USAGE ==="
        free -m | head -2
        for i in $(seq 1 50); do
          sudo btrfs subvolume create /mnt/stress/data/mem-$i > /dev/null 2>&1
          sudo dd if=/dev/urandom of=/mnt/stress/data/mem-$i/d.bin bs=1M count=10 2>/dev/null
        done
        sudo sync
        echo "After 50 x 10MB subvolumes:"
        free -m | head -2

    - name: "Test 8: Large Volume Write"
      continue-on-error: true
      run: |
        echo "=== TEST 8: LARGE VOLUME WRITE ==="
        for size in 1 2 4; do
          sudo btrfs subvolume create /mnt/stress/data/bigvol > /dev/null 2>&1
          START=$(date +%s%N)
          sudo dd if=/dev/zero of=/mnt/stress/data/bigvol/zero.bin bs=1M count=$((size * 1024)) 2>/dev/null
          sudo sync
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          if [ "$DURATION" -gt 0 ]; then
            RATE=$(( size * 1024 * 1000 / DURATION ))
          else
            RATE=9999
          fi
          echo "  ${size}GB: ${DURATION}ms = ${RATE}MB/s"
          sudo btrfs subvolume delete /mnt/stress/data/bigvol 2>/dev/null || true
        done

    - name: "Test 9: Disk Efficiency"
      continue-on-error: true
      run: |
        echo "=== TEST 9: DISK SPACE EFFICIENCY ==="
        echo "Before:"
        sudo btrfs filesystem usage /mnt/stress/data 2>/dev/null | head -3
        for i in $(seq 1 5); do
          sudo btrfs subvolume create /mnt/stress/data/dedup-$i > /dev/null 2>&1
          sudo dd if=/dev/zero of=/mnt/stress/data/dedup-$i/data.bin bs=1M count=100 2>/dev/null
        done
        sudo sync
        echo "After 5 x 100MB zero-filled:"
        sudo btrfs filesystem usage /mnt/stress/data 2>/dev/null | head -3
        for i in $(seq 1 5); do
          sudo btrfs subvolume delete /mnt/stress/data/dedup-$i 2>/dev/null || true
        done

    - name: "Test 10: CSI Binary"
      continue-on-error: true
      run: |
        echo "=== TEST 10: CSI BINARY ==="
        ls -lh ./target/release/btrfs-csi
        file ./target/release/btrfs-csi
        echo ""
        echo "Binary size: $(stat -c%s ./target/release/btrfs-csi) bytes"
        echo "Binary size: $(ls -lh ./target/release/btrfs-csi | awk '{print $5}')"

    - name: Final Cleanup
      if: always()
      continue-on-error: true
      run: |
        sudo btrfs subvolume list /mnt/stress/data 2>/dev/null | awk '{print $NF}' | while read sv; do
          sudo btrfs subvolume delete "/mnt/stress/data/$sv" 2>/dev/null || true
        done
        sudo umount /mnt/stress/data 2>/dev/null || true
        sudo rm -f /tmp/btrfs-stress.img
        echo "Cleanup done"

    - name: Results Summary
      if: always()
      run: |
        echo ""
        echo "============================================"
        echo "  STRESS TEST RESULTS - github runner"
        echo "============================================"
        echo ""
        echo "Environment:"
        echo "  CPU: $(nproc) cores"
        echo "  Memory: $(free -h | awk '/^Mem:/{print $2}')"
        echo "  Disk: $(df -h /tmp | tail -1 | awk '{print $2}')"
        echo ""
        echo "Note: Each test step above shows its own results."
        echo "GitHub Actions runner specs: 2 vCPU, 7GB RAM, 14GB SSD"
        echo "Real hardware will perform significantly better."
        echo ""
        echo "============================================"
