name: Stress Test - Find Maximums

on:
  push:
    paths:
      - 'stress-trigger'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level'
        required: true
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - extreme

jobs:
  stress-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y btrfs-progs fio sysstat jq

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build CSI driver
      run: cargo build --release

    - name: Create test environment
      run: |
        sudo truncate -s 10G /tmp/btrfs-stress.img
        sudo mkfs.btrfs -f -d single -m dup /tmp/btrfs-stress.img
        sudo mkdir -p /mnt/stress/data /mnt/stress/snapshots
        sudo mount -o loop /tmp/btrfs-stress.img /mnt/stress/data
        echo "Filesystem created:"
        df -h /mnt/stress/data
        sudo btrfs filesystem show /mnt/stress/data

    - name: Test 1 - Maximum Write Throughput
      run: |
        echo "=========================================="
        echo "  TEST 1: MAXIMUM WRITE THROUGHPUT"
        echo "=========================================="
        echo ""
        
        echo "bs,bw_kbps,iops,lat_ns" > /tmp/test1_results.csv
        
        for bs in 4k 16k 64k 256k 1m 4m 16m; do
          echo "--- Block size: $bs ---"
          sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches'
          
          sudo fio --name="write_${bs}" \
            --directory=/mnt/stress/data \
            --rw=write \
            --bs="$bs" \
            --size=1G \
            --numjobs=1 \
            --runtime=30 \
            --time_based \
            --group_reporting \
            --output-format=json \
            --output="/tmp/fio_${bs}.json"
          
          BW=$(jq '.jobs[0].write.bw' "/tmp/fio_${bs}.json")
          IOPS=$(jq '.jobs[0].write.iops' "/tmp/fio_${bs}.json")
          LAT=$(jq '.jobs[0].write.lat_ns.mean' "/tmp/fio_${bs}.json")
          BW_MB=$((BW / 1024))
          LAT_US=$((LAT / 1000))
          echo "$bs: ${BW_MB} MB/s, ${IOPS} IOPS, ${LAT_US} us latency"
          echo "$bs,$BW,$IOPS,$LAT" >> /tmp/test1_results.csv
          
          sudo rm -f /mnt/stress/data/write_*
          rm -f "/tmp/fio_${bs}.json"
        done
        
        echo ""
        echo "=== TEST 1 COMPLETE ==="
        cat /tmp/test1_results.csv

    - name: Test 2 - Maximum Random Write IOPS
      run: |
        echo "=========================================="
        echo "  TEST 2: MAXIMUM RANDOM WRITE IOPS"
        echo "=========================================="
        echo ""
        
        echo "bs,bw_kbps,iops,lat_ns" > /tmp/test2_results.csv
        
        for bs in 4k 16k 64k; do
          echo "--- Block size: $bs ---"
          sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches'
          
          sudo fio --name="randwrite_${bs}" \
            --directory=/mnt/stress/data \
            --rw=randwrite \
            --bs="$bs" \
            --size=512M \
            --numjobs=4 \
            --runtime=30 \
            --time_based \
            --group_reporting \
            --output-format=json \
            --output="/tmp/fio_rand_${bs}.json"
          
          BW=$(jq '.jobs[0].write.bw' "/tmp/fio_rand_${bs}.json")
          IOPS=$(jq '.jobs[0].write.iops' "/tmp/fio_rand_${bs}.json")
          LAT=$(jq '.jobs[0].write.lat_ns.mean' "/tmp/fio_rand_${bs}.json")
          BW_MB=$((BW / 1024))
          LAT_US=$((LAT / 1000))
          echo "$bs: ${BW_MB} MB/s, ${IOPS} IOPS, ${LAT_US} us latency"
          echo "$bs,$BW,$IOPS,$LAT" >> /tmp/test2_results.csv
          
          sudo rm -f /mnt/stress/data/randwrite_*
          rm -f "/tmp/fio_rand_${bs}.json"
        done
        
        echo ""
        echo "=== TEST 2 COMPLETE ==="
        cat /tmp/test2_results.csv

    - name: Test 3 - Maximum Concurrent Subvolumes
      run: |
        echo "=========================================="
        echo "  TEST 3: MAXIMUM CONCURRENT SUBVOLUMES"
        echo "=========================================="
        echo ""
        
        # Clean up from previous tests
        sudo btrfs subvolume list /mnt/stress/data 2>/dev/null | awk '{print $NF}' | while read sv; do
          sudo btrfs subvolume delete "/mnt/stress/data/$sv" 2>/dev/null || true
        done
        
        echo "Creating 500 subvolumes..."
        START=$(date +%s%N)
        
        for i in $(seq 1 500); do
          sudo btrfs subvolume create /mnt/stress/data/vol-$i > /dev/null 2>&1
        done
        
        END=$(date +%s%N)
        DURATION=$(( (END - START) / 1000000 ))
        echo "Created 500 subvolumes in ${DURATION}ms"
        echo "Average: $((DURATION / 500))ms per subvolume"
        echo "Throughput: $(( 500 * 1000 / (DURATION + 1) )) subvolumes/sec"
        
        echo ""
        echo "Listing subvolumes..."
        COUNT=$(sudo btrfs subvolume list /mnt/stress/data | wc -l)
        echo "Total subvolumes: $COUNT"
        
        echo ""
        echo "=== TEST 3 COMPLETE ==="

    - name: Test 4 - Maximum Snapshot Performance
      run: |
        echo "=========================================="
        echo "  TEST 4: MAXIMUM SNAPSHOT PERFORMANCE"
        echo "=========================================="
        echo ""
        
        echo "Creating 1GB test file in vol-1..."
        sudo dd if=/dev/urandom of=/mnt/stress/data/vol-1/testfile bs=1M count=1024 2>/dev/null
        sudo sync
        
        echo "Creating 100 snapshots of 1GB volume..."
        START=$(date +%s%N)
        
        for i in $(seq 1 100); do
          sudo btrfs subvolume snapshot -r /mnt/stress/data/vol-1 /mnt/stress/snap-$i > /dev/null 2>&1
        done
        
        END=$(date +%s%N)
        DURATION=$(( (END - START) / 1000000 ))
        echo "Created 100 snapshots in ${DURATION}ms"
        echo "Average: $((DURATION / 100))ms per snapshot"
        echo "Throughput: $(( 100 * 1000 / (DURATION + 1) )) snapshots/sec"
        
        echo ""
        echo "=== TEST 4 COMPLETE ==="

    - name: Test 5 - Maximum Replication Speed
      run: |
        echo "=========================================="
        echo "  TEST 5: MAXIMUM REPLICATION SPEED (btrfs send)"
        echo "=========================================="
        echo ""
        
        echo "size_mb,time_ms,throughput_mbps" > /tmp/test5_results.csv
        
        for size in 100 500 1024 2048; do
          echo "--- Testing ${size}MB ---"
          
          sudo btrfs subvolume create /mnt/stress/data/rep-test > /dev/null 2>&1
          sudo dd if=/dev/urandom of=/mnt/stress/data/rep-test/data.bin bs=1M count=$size 2>/dev/null
          sudo sync
          sudo btrfs subvolume snapshot -r /mnt/stress/data/rep-test /mnt/stress/rep-snap > /dev/null 2>&1
          
          echo "Sending ${size}MB via btrfs send..."
          START=$(date +%s%N)
          
          sudo btrfs send /mnt/stress/rep-snap 2>/dev/null | wc -c
          
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          if [ "$DURATION" -gt 0 ]; then
            THROUGHPUT=$(( size * 1000 / DURATION ))
          else
            THROUGHPUT=99999
          fi
          echo "Time: ${DURATION}ms, Throughput: ${THROUGHPUT}MB/s"
          echo "$size,$DURATION,$THROUGHPUT" >> /tmp/test5_results.csv
          
          sudo btrfs subvolume delete /mnt/stress/data/rep-test 2>/dev/null || true
          sudo btrfs subvolume delete /mnt/stress/rep-snap 2>/dev/null || true
        done
        
        echo ""
        echo "=== TEST 5 COMPLETE ==="
        cat /tmp/test5_results.csv

    - name: Test 6 - Maximum Incremental Replication
      run: |
        echo "=========================================="
        echo "  TEST 6: MAXIMUM INCREMENTAL REPLICATION"
        echo "=========================================="
        echo ""
        
        echo "Creating base data (1GB)..."
        sudo btrfs subvolume create /mnt/stress/data/inc-test > /dev/null 2>&1
        sudo dd if=/dev/urandom of=/mnt/stress/data/inc-test/base.bin bs=1M count=1024 2>/dev/null
        sudo sync
        sudo btrfs subvolume snapshot -r /mnt/stress/data/inc-test /mnt/stress/inc-snap1 > /dev/null 2>&1
        
        echo "base_time_ms,base_bytes" > /tmp/test6_results.csv
        
        # Full send baseline
        echo "Base full send (1GB)..."
        START=$(date +%s%N)
        sudo btrfs send /mnt/stress/inc-snap1 2>/dev/null | wc -c
        END=$(date +%s%N)
        BASE_DURATION=$(( (END - START) / 1000000 ))
        echo "Full send: ${BASE_DURATION}ms"
        echo "base,$BASE_DURATION,1024" >> /tmp/test6_results.csv
        
        echo ""
        echo "round,delta_mb,time_ms,bytes_sent_kb" > /tmp/test6_incremental.csv
        
        for round in 1 2 3 4 5; do
          DELTA=$((round * 100))
          echo "Round $round: adding ${DELTA}MB delta..."
          sudo dd if=/dev/urandom of=/mnt/stress/data/inc-test/delta-$round.bin bs=1M count=$DELTA 2>/dev/null
          sudo sync
          sudo btrfs subvolume snapshot -r /mnt/stress/data/inc-test /mnt/stress/inc-snap$((round+1)) > /dev/null 2>&1
          
          START=$(date +%s%N)
          BYTES=$(sudo btrfs send -p /mnt/stress/inc-snap$round /mnt/stress/inc-snap$((round+1)) 2>/dev/null | wc -c)
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          BYTES_KB=$((BYTES / 1024))
          echo "Round $round: ${DURATION}ms, sent ${BYTES_KB}KB"
          echo "$round,$DELTA,$DURATION,$BYTES_KB" >> /tmp/test6_incremental.csv
        done
        
        echo ""
        echo "=== TEST 6 COMPLETE ==="
        echo "Full send baseline: ${BASE_DURATION}ms for 1GB"
        cat /tmp/test6_incremental.csv
        
        # Cleanup
        sudo btrfs subvolume delete /mnt/stress/data/inc-test 2>/dev/null || true
        for i in $(seq 1 6); do
          sudo btrfs subvolume delete /mnt/stress/inc-snap$i 2>/dev/null || true
        done

    - name: Test 7 - Memory Usage Under Load
      run: |
        echo "=========================================="
        echo "  TEST 7: MEMORY USAGE UNDER LOAD"
        echo "=========================================="
        echo ""
        
        echo "Initial memory:"
        free -h
        echo ""
        
        # Start memory monitoring in background
        rm -f /tmp/memory.log
        (while true; do
          echo "$(date +%H:%M:%S): $(free -m | awk 'NR==2{printf "%.2f GB used", $3/1024}')" >> /tmp/memory.log
          sleep 2
        done) &
        MONITOR_PID=$!
        
        echo "Creating 100 subvolumes with 10MB each..."
        for i in $(seq 1 100); do
          sudo btrfs subvolume create /mnt/stress/data/mem-test-$i > /dev/null 2>&1
          sudo dd if=/dev/urandom of=/mnt/stress/data/mem-test-$i/data.bin bs=1M count=10 2>/dev/null
        done
        sudo sync
        
        echo "Creating 50 snapshots..."
        for i in $(seq 1 50); do
          sudo btrfs subvolume snapshot -r /mnt/stress/data/mem-test-1 /mnt/stress/mem-snap-$i > /dev/null 2>&1
        done
        
        kill $MONITOR_PID 2>/dev/null || true
        wait $MONITOR_PID 2>/dev/null || true
        
        echo ""
        echo "Memory usage during test:"
        cat /tmp/memory.log
        echo ""
        echo "Final memory:"
        free -h
        
        echo ""
        echo "=== TEST 7 COMPLETE ==="

    - name: Test 8 - Maximum Volume Size
      run: |
        echo "=========================================="
        echo "  TEST 8: MAXIMUM VOLUME SIZE"
        echo "=========================================="
        echo ""
        
        echo "size_gb,time_ms,throughput_mbps" > /tmp/test8_results.csv
        
        for size in 1 2 4; do
          echo "--- Testing ${size}GB volume ---"
          sudo btrfs subvolume create /mnt/stress/data/bigvol-${size}gb > /dev/null 2>&1
          
          START=$(date +%s%N)
          sudo dd if=/dev/zero of=/mnt/stress/data/bigvol-${size}gb/zero.bin bs=1M count=$((size * 1024)) 2>/dev/null
          sudo sync
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          if [ "$DURATION" -gt 0 ]; then
            THROUGHPUT=$(( size * 1024 * 1000 / DURATION ))
          else
            THROUGHPUT=99999
          fi
          echo "Write time: ${DURATION}ms, Throughput: ${THROUGHPUT}MB/s"
          echo "$size,$DURATION,$THROUGHPUT" >> /tmp/test8_results.csv
          
          sudo btrfs subvolume delete /mnt/stress/data/bigvol-${size}gb 2>/dev/null || true
        done
        
        echo ""
        echo "=== TEST 8 COMPLETE ==="
        cat /tmp/test8_results.csv

    - name: Test 9 - Disk Space Efficiency
      run: |
        echo "=========================================="
        echo "  TEST 9: DISK SPACE EFFICIENCY"
        echo "=========================================="
        echo ""
        
        echo "Before dedup test:"
        sudo btrfs filesystem usage /mnt/stress/data 2>/dev/null | head -5
        echo ""
        
        echo "Creating 10 subvolumes with 100MB of /dev/zero (highly compressible)..."
        for i in $(seq 1 10); do
          sudo btrfs subvolume create /mnt/stress/data/identical-$i > /dev/null 2>&1
          sudo dd if=/dev/zero of=/mnt/stress/data/identical-$i/data.bin bs=1M count=100 2>/dev/null
        done
        sudo sync
        
        echo "After 10 x 100MB zero-filled subvolumes:"
        sudo btrfs filesystem usage /mnt/stress/data 2>/dev/null | head -5
        echo ""
        
        echo "=== TEST 9 COMPLETE ==="
        
        # Cleanup
        for i in $(seq 1 10); do
          sudo btrfs subvolume delete /mnt/stress/data/identical-$i 2>/dev/null || true
        done

    - name: Test 10 - CSI Binary Performance
      run: |
        echo "=========================================="
        echo "  TEST 10: CSI BINARY PERFORMANCE"
        echo "=========================================="
        echo ""
        
        cat > /tmp/csi-test-config.toml <<'CSIEOF'
[node]
node_id = "stress-test-node"
listen_addr = "0.0.0.0"
listen_port = 9200
zone = "dc1"
auth_key = "test-key-12345678901234567890123456789012"
seed_nodes = []

[replication]
default_replica_count = 2
default_interval = 1
data_dir = "/mnt/stress/data"
snapshot_dir = "/mnt/stress/snapshots"
enable_incremental = true

[maintenance]
enabled = false
CSIEOF
        
        echo "CSI binary size:"
        ls -lh ./target/release/btrfs-csi
        echo ""
        
        echo "Testing CSI binary startup time..."
        for i in $(seq 1 10); do
          START=$(date +%s%N)
          timeout 1 ./target/release/btrfs-csi --config /tmp/csi-test-config.toml --endpoint 0.0.0.0:9201 2>/dev/null || true
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          echo "Run $i: ${DURATION}ms"
        done
        
        echo ""
        echo "=== TEST 10 COMPLETE ==="

    - name: Final Cleanup
      if: always()
      run: |
        echo "=== Cleaning up test data ==="
        sudo btrfs subvolume list /mnt/stress/data 2>/dev/null | awk '{print $NF}' | while read sv; do
          sudo btrfs subvolume delete "/mnt/stress/data/$sv" 2>/dev/null || true
        done
        sudo umount /mnt/stress/data 2>/dev/null || true
        sudo rm -f /tmp/btrfs-stress.img
        echo "=== Cleanup complete ==="
      continue-on-error: true

    - name: Results Summary
      if: always()
      run: |
        echo ""
        echo "=========================================="
        echo "  STRESS TEST RESULTS SUMMARY"
        echo "=========================================="
        echo ""
        echo "Test completed at: $(date)"
        echo ""
        echo "Environment:"
        echo "  OS: $(lsb_release -d 2>/dev/null | cut -f2)"
        echo "  Kernel: $(uname -r)"
        echo "  CPU: $(nproc) cores"
        echo "  Memory: $(free -h | awk '/^Mem:/{print $2}')"
        echo "  Disk: $(df -h /tmp | tail -1 | awk '{print $2}')"
        echo ""
        echo "--- Test 1: Sequential Write Throughput ---"
        cat /tmp/test1_results.csv 2>/dev/null || echo "No results"
        echo ""
        echo "--- Test 2: Random Write IOPS ---"
        cat /tmp/test2_results.csv 2>/dev/null || echo "No results"
        echo ""
        echo "--- Test 5: Replication Speed ---"
        cat /tmp/test5_results.csv 2>/dev/null || echo "No results"
        echo ""
        echo "--- Test 6: Incremental Replication ---"
        cat /tmp/test6_incremental.csv 2>/dev/null || echo "No results"
        echo ""
        echo "--- Test 8: Volume Size ---"
        cat /tmp/test8_results.csv 2>/dev/null || echo "No results"
        echo ""
        echo "--- Memory Usage ---"
        cat /tmp/memory.log 2>/dev/null || echo "No results"
        echo ""
        echo "=========================================="

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stress-test-results
        path: |
          /tmp/test1_results.csv
          /tmp/test2_results.csv
          /tmp/test5_results.csv
          /tmp/test6_results.csv
          /tmp/test6_incremental.csv
          /tmp/test8_results.csv
          /tmp/memory.log
