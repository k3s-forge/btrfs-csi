name: Nomad Cluster CSI Test

on:
  push:
    branches: [main]
    paths:
      - 'nomad-csi-trigger'
  workflow_dispatch:
    inputs: {}

jobs:
  nomad-csi:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y btrfs-progs protobuf-compiler jq attr
      - name: Install Nomad
        uses: hashicorp/setup-nomad@ca731f0157d0e00b6e69b8e06e262f9a7a118643 # v2.0.0
        with:
          version: "1.8.1"
      - name: Build CSI driver
        run: cargo build --release
      - name: Setup btrfs filesystems
        run: |
          sudo truncate -s 10G /tmp/btrfs-csi-data.img
          sudo mkfs.btrfs -f -d single -m dup /tmp/btrfs-csi-data.img
          sudo mkdir -p /mnt/btrfs/data /mnt/btrfs/snapshots
          sudo mount -o loop /tmp/btrfs-csi-data.img /mnt/btrfs/data
          sudo truncate -s 10G /tmp/btrfs-replica.img
          sudo mkfs.btrfs -f -d single -m dup /tmp/btrfs-replica.img
          sudo mkdir -p /mnt/btrfs/replica-data /mnt/btrfs/replica-snapshots
          sudo mount -o loop /tmp/btrfs-replica.img /mnt/btrfs/replica-data
          df -h /mnt/btrfs/data /mnt/btrfs/replica-data
      - name: Write entrypoint script
        run: |
          sudo tee /usr/local/bin/btrfs-csi-entrypoint.sh <<'SCRIPTEOF' > /dev/null
          #!/bin/bash
          set -e
          NODE_NAME="${NOMAD_META_NODE_NAME:-unknown}"
          CSI_ENDPOINT="${CSI_ENDPOINT:-unix:///var/tmp/csi/csi.sock}"
          DATA_DIR="${NOMAD_META_DATA_DIR:-/mnt/btrfs/data}"
          SNAP_DIR="${NOMAD_META_SNAP_DIR:-/mnt/btrfs/snapshots}"
          mkdir -p /var/tmp/csi
          AUTH_KEY=$(openssl rand -hex 32)
          cat > "/tmp/btrfs-csi-config-${NODE_NAME}.toml" <<CONFEOF
          node_id = "${NODE_NAME}"
          zone = "dc1"
          auth_key = "${AUTH_KEY}"
          seed_nodes = []
          gossip_interval = 10
          heartbeat_interval = 30
          node_timeout = 90

          [replication]
          default_replica_count = 1
          default_interval = 30
          max_concurrent = 4
          data_dir = "${DATA_DIR}"
          snapshot_dir = "${SNAP_DIR}"
          enable_incremental = true

          [maintenance]
          enabled = false
          CONFEOF
          exec /home/runner/work/btrfs-csi/btrfs-csi/target/release/btrfs-csi \
            --config "/tmp/btrfs-csi-config-${NODE_NAME}.toml" \
            --endpoint "${CSI_ENDPOINT}" \
            --node-id "${NODE_NAME}" \
            --log-level debug
          SCRIPTEOF
          sudo chmod +x /usr/local/bin/btrfs-csi-entrypoint.sh
      - name: Start Nomad server
        run: |
          mkdir -p /tmp/nomad/server/data
          printf '%s\n' \
            'data_dir = "/tmp/nomad/server/data"' \
            'bind_addr = "127.0.0.1"' \
            'log_level = "INFO"' \
            'server {' \
            '  enabled = true' \
            '  bootstrap_expect = 1' \
            '}' \
            'ports {' \
            '  http = 14646' \
            '  rpc = 14647' \
            '  serf = 14648' \
            '}' \
            'advertise {' \
            '  http = "127.0.0.1"' \
            '  rpc = "127.0.0.1"' \
            '  serf = "127.0.0.1"' \
            '}' \
            | sudo tee /tmp/nomad/server.hcl > /dev/null
          SERVER_OK=""
          nomad agent -config=/tmp/nomad/server.hcl > /tmp/nomad-server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:14646/v1/status/leader 2>/dev/null | grep -q '"'; then
              echo "Server ready"; SERVER_OK="yes"; break
            fi
            sleep 2
          done
          if [ -z "$SERVER_OK" ]; then
            echo "=== Server failed to start! ==="
            sudo cat /tmp/nomad-server.log || true
            exit 1
          fi
      - name: Start Nomad client
        run: |
          mkdir -p /tmp/nomad/client/data
          printf '%s\n' \
            'data_dir = "/tmp/nomad/client/data"' \
            'bind_addr = "127.0.0.1"' \
            'log_level = "INFO"' \
            'datacenter = "dc1"' \
            'client {' \
            '  enabled = true' \
            '  servers = ["127.0.0.1:14647"]' \
            '  meta {' \
            '    node_name = "nomad-csi-node-1"' \
            '    data_dir = "/mnt/btrfs/data"' \
            '    snap_dir = "/mnt/btrfs/snapshots"' \
            '  }' \
            '}' \
            'plugin "exec" { config { enabled = true } }' \
            'ports {' \
            '  http = 24646' \
            '  rpc = 24647' \
            '  serf = 24648' \
            '}' \
            'advertise {' \
            '  http = "127.0.0.1"' \
            '  rpc = "127.0.0.1"' \
            '  serf = "127.0.0.1"' \
            '}' \
            | sudo tee /tmp/nomad/client.hcl > /dev/null
          NOMAD_ADDR=http://127.0.0.1:14646 nomad agent -config=/tmp/nomad/client.hcl > /tmp/nomad-client.log 2>&1 &
          for i in $(seq 1 30); do
            sleep 3
            NODES=$(NOMAD_ADDR=http://127.0.0.1:14646 nomad node status 2>/dev/null | grep -c "ready" || true)
            if [ "$NODES" -ge 1 ]; then echo "Client ready"; NOMAD_ADDR=http://127.0.0.1:14646 nomad node status; break; fi
            echo "  Waiting for client... ($i)"
          done
          cat /tmp/nomad-client.log || echo "No client log"
      - name: Deploy CSI plugin
        run: |
          cat > /tmp/csi-plugin.nomad <<'NOMADEOF'
          job "btrfs-csi" {
            type = "system"
            datacenters = ["dc1"]
            group "nodes" {
              task "plugin" {
                driver = "exec"
                config { command = "/usr/local/bin/btrfs-csi-entrypoint.sh" }
                csi_plugin {
                  id = "btrfs-csi"
                  type = "monolith"
                  mount_dir = "/var/tmp/csi"
                  health_timeout = "120s"
                }
                resources {
                  cpu = 500
                  memory = 256
                }
              }
            }
          }
          NOMADEOF
          NOMAD_ADDR=http://127.0.0.1:14646 nomad job run /tmp/csi-plugin.nomad
           for i in $(seq 1 60); do
             sleep 5
             PLUGIN_OK=$(NOMAD_ADDR=http://127.0.0.1:14646 nomad plugin status btrfs-csi 2>/dev/null || true)
             CTRL_HEALTHY=$(echo "$PLUGIN_OK" | grep "Controllers Healthy" | awk '{print $4}')
             NODE_HEALTHY=$(echo "$PLUGIN_OK" | grep "Nodes Healthy" | awk '{print $4}')
             if [ -n "$CTRL_HEALTHY" ] && [ "$CTRL_HEALTHY" -eq "$CTRL_HEALTHY" ] 2>/dev/null && [ "$CTRL_HEALTHY" -gt 0 ] && [ -n "$NODE_HEALTHY" ] && [ "$NODE_HEALTHY" -eq "$NODE_HEALTHY" ] 2>/dev/null && [ "$NODE_HEALTHY" -gt 0 ]; then
               echo "=== CSI Plugin Healthy! ==="
               NOMAD_ADDR=http://127.0.0.1:14646 nomad plugin status btrfs-csi; break
             fi
             echo "  Waiting for plugin health... ($i) Ctrl=$CTRL_HEALTHY Node=$NODE_HEALTHY"
           done
          NOMAD_ADDR=http://127.0.0.1:14646 nomad job status btrfs-csi
      - name: "Test A: Create Volume"
        continue-on-error: true
        run: |
          NOMAD_ADDR=http://127.0.0.1:14646
          printf '%s\n' \
            'id = "vol-test-1"' \
            'name = "vol-test-1"' \
            'type = "csi"' \
            'plugin_id = "btrfs-csi"' \
            'capacity_min = "1GiB"' \
            'capacity_max = "10GiB"' \
            'capability {' \
            '  access_mode = "single-node-writer"' \
            '  attachment_mode = "file-system"' \
            '}' \
            > /tmp/vol-test-1.nomad
          nomad volume create /tmp/vol-test-1.nomad && nomad volume list && nomad volume status vol-test-1
      - name: "Test B: Write job"
        continue-on-error: true
        run: |
          NOMAD_ADDR=http://127.0.0.1:14646
          printf '%s\n' \
            'job "volume-writer" {' \
            '  datacenters = ["dc1"]' \
            '  type = "batch"' \
            '  group "write" {' \
            '    volume "data" {' \
            '      type = "csi"' \
            '      source = "vol-test-1"' \
            '      read_only = false' \
            '      attachment_mode = "file-system"' \
            '      access_mode = "single-node-writer"' \
            '    }' \
            '    task "write" {' \
            '      driver = "exec"' \
            '      config { command = "/bin/bash"; args = ["-c", "echo HELLO_NOMAD_CSI > /data/hello.txt; sync; cat /data/hello.txt"] }' \
            '      volume_mount { volume = "data"; destination = "/data" }' \
            '      resources {' \
            '        cpu = 100' \
            '        memory = 32' \
            '      }' \
            '    }' \
            '  }' \
            '}' \
            > /tmp/job-writer.nomad
          nomad job run /tmp/job-writer.nomad
          for i in $(seq 1 15); do
            sleep 2
            STATUS=$(nomad job status volume-writer 2>/dev/null | grep "^Status" | awk '{print $2}')
            [ "$STATUS" = "dead" ] || [ "$STATUS" = "complete" ] && break
          done
          ALLOC_ID=$(nomad job allocs volume-writer 2>/dev/null | grep -v "ID" | awk '{print $1}' | head -1)
          [ -n "$ALLOC_ID" ] && nomad alloc logs "$ALLOC_ID" || echo "No logs"
      - name: "Test C: Read job"
        continue-on-error: true
        run: |
          NOMAD_ADDR=http://127.0.0.1:14646
          printf '%s\n' \
            'job "volume-reader" {' \
            '  datacenters = ["dc1"]' \
            '  type = "batch"' \
            '  group "read" {' \
            '    volume "data" {' \
            '      type = "csi"' \
            '      source = "vol-test-1"' \
            '      read_only = true' \
            '      attachment_mode = "file-system"' \
            '      access_mode = "single-node-writer"' \
            '    }' \
            '    task "read" {' \
            '      driver = "exec"' \
            '      config { command = "/bin/bash"; args = ["-c", "cat /data/hello.txt"] }' \
            '      volume_mount { volume = "data"; destination = "/data" }' \
            '      resources {' \
            '        cpu = 100' \
            '        memory = 32' \
            '      }' \
            '    }' \
            '  }' \
            '}' \
            > /tmp/job-reader.nomad
          nomad job run /tmp/job-reader.nomad
          for i in $(seq 1 15); do
            sleep 2
            STATUS=$(nomad job status volume-reader 2>/dev/null | grep "^Status" | awk '{print $2}')
            [ "$STATUS" = "dead" ] || [ "$STATUS" = "complete" ] && break
          done
          ALLOC_ID=$(nomad job allocs volume-reader 2>/dev/null | grep -v "ID" | awk '{print $1}' | head -1)
          [ -n "$ALLOC_ID" ] && nomad alloc logs "$ALLOC_ID" || echo "No logs"
      - name: "Test D: Verify btrfs"
        continue-on-error: true
        run: |
          sudo btrfs subvolume list /mnt/btrfs/data/ 2>/dev/null || true
          sudo find /mnt/btrfs/data/ -name "hello.txt" -exec cat {} \; 2>/dev/null || echo "not found on node1"
          df -h /mnt/btrfs/data
      - name: "Test E: Direct btrfs replication"
        continue-on-error: true
        run: |
          sudo btrfs subvolume create /mnt/btrfs/data/repl-test
          dd if=/dev/urandom of=/mnt/btrfs/data/repl-test/data.bin bs=1M count=100 2>/dev/null
          sync
          sudo btrfs subvolume snapshot -r /mnt/btrfs/data/repl-test /mnt/btrfs/snapshots/repl-snap
          sudo btrfs send /mnt/btrfs/snapshots/repl-snap 2>/dev/null | sudo btrfs receive /mnt/btrfs/replica-data/ 2>/dev/null
          sudo ls -la /mnt/btrfs/replica-data/repl-snap/
          sudo btrfs subvolume delete /mnt/btrfs/data/repl-test 2>/dev/null || true
          sudo btrfs subvolume delete /mnt/btrfs/snapshots/repl-snap 2>/dev/null || true
          sudo btrfs subvolume delete /mnt/btrfs/replica-data/repl-snap 2>/dev/null || true
      - name: Cleanup
        if: always()
        run: |
          NOMAD_ADDR=http://127.0.0.1:14646 nomad job stop -purge btrfs-csi 2>/dev/null || true
          NOMAD_ADDR=http://127.0.0.1:14646 nomad volume delete vol-test-1 2>/dev/null || true
          sudo pkill -f "nomad agent" 2>/dev/null || true; sleep 2
          sudo umount /mnt/btrfs/data /mnt/btrfs/replica-data 2>/dev/null || true
          sudo rm -f /tmp/btrfs-csi-data.img /tmp/btrfs-replica.img
          sudo rm -rf /tmp/nomad /var/tmp/csi /usr/local/bin/btrfs-csi-entrypoint.sh
          echo "Cleanup complete"
