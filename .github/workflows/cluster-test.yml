name: Test Cluster

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cluster-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y btrfs-progs iproute2 jq protobuf-compiler

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cluster-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build CSI driver
      run: cargo build --release

    - name: Create btrfs test filesystems
      run: |
        for i in 1 2 3; do
          sudo truncate -s 5G /tmp/btrfs-node${i}.img
          sudo mkfs.btrfs -f /tmp/btrfs-node${i}.img
          sudo mkdir -p /mnt/node${i}/data /mnt/node${i}/snapshots
          sudo mount -o loop /tmp/btrfs-node${i}.img /mnt/node${i}/data
          sudo ln -sf /mnt/node${i}/data /mnt/node${i}/snapshots
        done
        for i in 1 2 3; do
          echo "Node $i:"
          sudo btrfs filesystem show /mnt/node${i}/data
        done

    - name: Test btrfs operations
      run: |
        echo "=== Testing btrfs subvolume operations ==="
        for i in 1 2 3; do
          echo "--- Node $i ---"
          sudo btrfs subvolume create /mnt/node${i}/data/vol-test
          sudo dd if=/dev/urandom of=/mnt/node${i}/data/vol-test/test.bin bs=1M count=100
          sudo sync
          sudo btrfs subvolume snapshot -r /mnt/node${i}/data/vol-test /mnt/node${i}/data/snap-1
          sudo dd if=/dev/urandom of=/mnt/node${i}/data/vol-test/more.bin bs=1M count=50
          sudo sync
          sudo btrfs subvolume snapshot -r /mnt/node${i}/data/vol-test /mnt/node${i}/data/snap-2
          echo "Testing incremental send on node $i..."
          sudo btrfs send -p /mnt/node${i}/data/snap-1 /mnt/node${i}/data/snap-2 | wc -c
          echo "bytes sent"
          sudo btrfs filesystem usage /mnt/node${i}/data
        done
        echo "=== All btrfs tests passed! ==="

    - name: Test CSI binary
      run: |
        echo "=== Testing CSI binary ==="
        ./target/release/btrfs-csi --help
        cat > /tmp/test-config.toml <<'EOF'
        [node]
        node_id = "test-node"
        listen_addr = "0.0.0.0"
        listen_port = 9200
        zone = "dc1"
        auth_key = "test-key-12345678901234567890123456789012"
        seed_nodes = []
        
        [replication]
        default_replica_count = 2
        default_interval = 10
        data_dir = "/tmp/test-data"
        snapshot_dir = "/tmp/test-snapshots"
        enable_incremental = true
        
        [maintenance]
        enabled = true
        balance_threshold = 0.7
        EOF
        mkdir -p /tmp/test-data /tmp/test-snapshots
        timeout 3 ./target/release/btrfs-csi --config /tmp/test-config.toml --endpoint 0.0.0.0:9201 || true
        echo "=== CSI binary test complete ==="

    - name: Test replication protocol
      run: |
        echo "=== Testing replication protocol ==="
        ./target/release/btrfs-csi --config /tmp/test-config.toml --endpoint 0.0.0.0:9201 &
        CSI_PID=$!
        sleep 2
        if kill -0 $CSI_PID 2>/dev/null; then
          echo "CSI server started successfully"
          timeout 2 nc -zv localhost 9201 && echo "Port 9201 is open" || echo "Port 9201 closed"
          kill $CSI_PID || true
        else
          echo "CSI server exited (expected in test env)"
        fi
        echo "=== Protocol test complete ==="

    - name: Test large data replication
      run: |
        echo "=== Testing large data replication ==="
        echo "Node 1: Creating 500MB volume..."
        sudo btrfs subvolume create /mnt/node1/data/large-vol
        sudo dd if=/dev/urandom of=/mnt/node1/data/large-vol/data.bin bs=1M count=500
        sudo sync
        echo "Node 1: Creating snapshot..."
        sudo btrfs subvolume snapshot -r /mnt/node1/data/large-vol /mnt/node1/data/large-snap
        echo "Node 1 -> Node 2: Simulating send..."
        sudo btrfs send /mnt/node1/data/large-snap | sudo btrfs receive /mnt/node2/data/
        echo "Verifying data on Node 2..."
        ls -la /mnt/node2/data/large-snap/
        sudo md5sum /mnt/node1/data/large-vol/data.bin /mnt/node2/data/large-snap/data.bin
        echo "=== Large data test complete ==="

    - name: Cleanup
      if: always()
      run: |
        echo "=== Cleanup ==="
        for i in 1 2 3; do
          sudo umount /mnt/node${i}/data 2>/dev/null || true
          sudo rm -f /tmp/btrfs-node${i}.img 2>/dev/null || true
        done
        echo "=== Cleanup complete ==="
      continue-on-error: true