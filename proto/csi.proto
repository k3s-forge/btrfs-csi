syntax = "proto3";

package csi;

// CSI Identity Service
service Identity {
  rpc GetPluginInfo(GetPluginInfoRequest)
      returns (GetPluginInfoResponse) {}

  rpc GetPluginCapabilities(GetPluginCapabilitiesRequest)
      returns (GetPluginCapabilitiesResponse) {}

  rpc Probe(ProbeRequest) returns (ProbeResponse) {}
}

// CSI Controller Service
service Controller {
  rpc CreateVolume(CreateVolumeRequest)
      returns (CreateVolumeResponse) {}

  rpc DeleteVolume(DeleteVolumeRequest)
      returns (DeleteVolumeResponse) {}

  rpc ControllerPublishVolume(ControllerPublishVolumeRequest)
      returns (ControllerPublishVolumeResponse) {}

  rpc ControllerUnpublishVolume(ControllerUnpublishVolumeRequest)
      returns (ControllerUnpublishVolumeResponse) {}

  rpc ValidateVolumeCapabilities(ValidateVolumeCapabilitiesRequest)
      returns (ValidateVolumeCapabilitiesResponse) {}

  rpc ListVolumes(ListVolumesRequest)
      returns (ListVolumesResponse) {}

  rpc GetCapacity(GetCapacityRequest)
      returns (GetCapacityResponse) {}

  rpc CreateSnapshot(CreateSnapshotRequest)
      returns (CreateSnapshotResponse) {}

  rpc DeleteSnapshot(DeleteSnapshotRequest)
      returns (DeleteSnapshotResponse) {}

  rpc ListSnapshots(ListSnapshotsRequest)
      returns (ListSnapshotsResponse) {}

  rpc ControllerExpandVolume(ControllerExpandVolumeRequest)
      returns (ControllerExpandVolumeResponse) {}

  rpc ControllerGetVolume(ControllerGetVolumeRequest)
      returns (ControllerGetVolumeResponse) {}
}

// CSI Node Service
service Node {
  rpc NodeStageVolume(NodeStageVolumeRequest)
      returns (NodeStageVolumeResponse) {}

  rpc NodeUnstageVolume(NodeUnstageVolumeRequest)
      returns (NodeUnstageVolumeResponse) {}

  rpc NodePublishVolume(NodePublishVolumeRequest)
      returns (NodePublishVolumeResponse) {}

  rpc NodeUnpublishVolume(NodeUnpublishVolumeRequest)
      returns (NodeUnpublishVolumeResponse) {}

  rpc NodeGetVolumeStats(NodeGetVolumeStatsRequest)
      returns (NodeGetVolumeStatsResponse) {}

  rpc NodeExpandVolume(NodeExpandVolumeRequest)
      returns (NodeExpandVolumeResponse) {}

  rpc NodeGetCapabilities(NodeGetCapabilitiesRequest)
      returns (NodeGetCapabilitiesResponse) {}

  rpc NodeGetInfo(NodeGetInfoRequest)
      returns (NodeGetInfoResponse) {}
}

// ========== Common Types ==========

message VolumeCapability {
  message Mount {
    string fs_type = 1;
    map<string, string> mount_flags = 2;
  }

  message Block {
  }

  message AccessType {
    oneof access_type {
      Mount mount = 1;
      Block block = 2;
    }
  }

  message AccessMode {
    enum Mode {
      UNKNOWN = 0;
      SINGLE_NODE_WRITER = 1;
      SINGLE_NODE_ONLY_READER = 2;
      MULTI_NODE_READER_ONLY = 3;
      MULTI_NODE_SINGLE_WRITER = 4;
      MULTI_NODE_MULTI_WRITER = 5;
    }
    Mode mode = 1;
  }

  AccessType access_type = 1;
  AccessMode access_mode = 2;
}

message TopologyRequirement {
  repeated Topology requisite = 1;
  repeated Topology preferred = 2;
}

message Topology {
  map<string, string> segments = 1;
}

message CapacityRange {
  int64 required_bytes = 1;
  int64 limit_bytes = 2;
}

message Volume {
  string volume_id = 1;
  int64 capacity_bytes = 2;
  VolumeCapability volume_capabilities = 3;
  map<string, string> volume_context = 4;
  map<string, string> parameters = 5;
  string content_source_volume_id = 6;
  string content_source_snapshot_id = 7;
  repeated Topology accessible_topology = 8;
}

message VolumeStatus {
  string volume_id = 1;
  repeated NodeUsage node_id = 2;
  repeated Topology accessible_topology = 3;
  message NodeUsage {
    string node_id = 1;
    VolumeCondition volume_condition = 2;
  }
}

message VolumeCondition {
  bool abnormal = 1;
  string message = 2;
}

message Snapshot {
  string snapshot_id = 1;
  string source_volume_id = 2;
  int64 creation_time = 3;
  int64 size_bytes = 4;
  map<string, string> snapshot_context = 5;
}

// ========== Identity Types ==========

message GetPluginInfoRequest {}

message GetPluginInfoResponse {
  string name = 1;
  string vendor_version = 2;
  map<string, string> manifest = 3;
}

message GetPluginCapabilitiesRequest {}

message GetPluginCapabilitiesResponse {
  repeated Capability capabilities = 1;

  message Capability {
    oneof type {
      Service service = 1;
      VolumeCapability volume_capability = 2;
    }
  }

  message Service {
    enum Type {
      UNKNOWN = 0;
      CONTROLLER_SERVICE = 1;
      VOLUME_ACCESSIBILITY_CONSTRAINTS = 2;
    }
    Type type = 1;
  }
}

message ProbeRequest {}

message ProbeResponse {
  bool ready = 1;
}

// ========== Controller Types ==========

message CreateVolumeRequest {
  string name = 1;
  CapacityRange capacity_range = 2;
  VolumeCapability volume_capabilities = 3;
  map<string, string> parameters = 4;
  string content_source_snapshot_id = 5;
  string content_source_volume_id = 6;
  TopologyRequirement topology_requirement = 7;
}

message CreateVolumeResponse {
  Volume volume = 1;
}

message DeleteVolumeRequest {
  string volume_id = 1;
}

message DeleteVolumeResponse {}

message ControllerPublishVolumeRequest {
  string volume_id = 1;
  string node_id = 2;
  VolumeCapability volume_capability = 3;
  string client_token = 4;
  map<string, string> parameters = 5;
  map<string, string> secrets = 6;
}

message ControllerPublishVolumeResponse {
  string publish_context = 1;
}

message ControllerUnpublishVolumeRequest {
  string volume_id = 1;
  string node_id = 2;
  map<string, string> secrets = 3;
}

message ControllerUnpublishVolumeResponse {}

message ValidateVolumeCapabilitiesRequest {
  repeated string volume_id = 1;
  Volume volume_capabilities = 2;
  map<string, string> parameters = 3;
  map<string, string> secrets = 4;
}

message ValidateVolumeCapabilitiesResponse {
  message Confirmed {
    VolumeCapability volume_capabilities = 1;
    map<string, string> parameters = 2;
  }
  repeated Confirmed confirmed = 1;
  string message = 2;
}

message ListVolumesRequest {
  int32 max_entries = 1;
  string starting_token = 2;
}

message ListVolumesResponse {
  message Entry {
    Volume volume = 1;
    VolumeStatus status = 2;
  }
  repeated Entry entries = 1;
  string next_token = 2;
}

message GetCapacityRequest {
  TopologyRequirement topology_requirement = 1;
  VolumeCapability volume_capabilities = 2;
  map<string, string> parameters = 3;
}

message GetCapacityResponse {
  int64 available_capacity = 1;
}

message CreateSnapshotRequest {
  string source_volume_id = 1;
  string name = 2;
  map<string, string> parameters = 3;
  map<string, string> secrets = 4;
}

message CreateSnapshotResponse {
  Snapshot snapshot = 1;
}

message DeleteSnapshotRequest {
  string snapshot_id = 1;
  map<string, string> secrets = 2;
}

message DeleteSnapshotResponse {}

message ListSnapshotsRequest {
  int32 max_entries = 1;
  string starting_token = 2;
  string source_volume_id = 3;
}

message ListSnapshotsResponse {
  message Entry {
    Snapshot snapshot = 1;
  }
  repeated Entry entries = 1;
  string next_token = 2;
}

message ControllerExpandVolumeRequest {
  string volume_id = 1;
  CapacityRange capacity_range = 2;
  VolumeCapability volume_capability = 3;
  map<string, string> parameters = 4;
  map<string, string> secrets = 5;
}

message ControllerExpandVolumeResponse {
  int64 capacity_bytes = 1;
  bool node_expansion_required = 2;
}

message ControllerGetVolumeRequest {
  string volume_id = 1;
}

message ControllerGetVolumeResponse {
  Volume volume = 1;
  VolumeStatus status = 2;
}

// ========== Node Types ==========

message NodeStageVolumeRequest {
  string volume_id = 1;
  string publish_context = 2;
  string staging_target_path = 3;
  VolumeCapability volume_capability = 4;
  map<string, string> volume_context = 5;
  map<string, string> secrets = 6;
}

message NodeStageVolumeResponse {}

message NodeUnstageVolumeRequest {
  string volume_id = 1;
  string staging_target_path = 2;
}

message NodeUnstageVolumeResponse {}

message NodePublishVolumeRequest {
  string volume_id = 1;
  string publish_context = 2;
  string target_path = 3;
  VolumeCapability volume_capability = 4;
  bool readonly = 5;
  map<string, string> volume_context = 6;
  map<string, string> secrets = 7;
}

message NodePublishVolumeResponse {}

message NodeUnpublishVolumeRequest {
  string volume_id = 1;
  string target_path = 2;
}

message NodeUnpublishVolumeResponse {}

message NodeGetVolumeStatsRequest {
  string volume_id = 1;
  string volume_path = 2;
  string staging_target_path = 3;
}

message NodeGetVolumeStatsResponse {
  VolumeUsage usage = 1;
  VolumeAttributes volume_attributes = 2;

  message VolumeUsage {
    int64 available = 1;
    int64 total = 2;
    int64 used = 3;
    enum Unit {
      UNKNOWN = 0;
      BYTES = 1;
      INODES = 2;
    }
    Unit unit = 4;
  }

  message VolumeAttributes {
    map<string, string> attributes = 1;
  }
}

message NodeExpandVolumeRequest {
  string volume_id = 1;
  string volume_path = 2;
  CapacityRange capacity_range = 3;
  bool staging_path = 4;
}

message NodeExpandVolumeResponse {
  int64 capacity_bytes = 1;
}

message NodeGetCapabilitiesRequest {}

message NodeGetCapabilitiesResponse {
  repeated NodeCapability capabilities = 1;

  message NodeCapability {
    oneof type {
      Service service = 1;
      VolumeCapability volume_capability = 2;
    }
  }

  message Service {
    enum Type {
      UNKNOWN = 0;
      STAGE_UNSTAGE_VOLUME = 1;
    }
    Type type = 1;
  }
}

message NodeGetInfoRequest {}

message NodeGetInfoResponse {
  string node_id = 1;
  Topology accessible_topology = 2;
}
